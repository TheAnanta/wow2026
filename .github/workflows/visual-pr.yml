name: PR Multi-Page Preview

on: [pull_request]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post comments
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed pages
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            pages/**/*.{js,jsx,ts,tsx}
            src/app/**/*.{js,jsx,ts,tsx}

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start App
        run: npm run dev & # Or your specific build/start command
        env:
          TARGET_URL: http://localhost:3000

      - name: Take Screenshots
        run: |
          mkdir -p screenshots
          # Clean up the file paths to create URL slugs
          URLS=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | sed 's|src/app/||g; s|pages/||g; s|/page||g; s|.tsx||g; s|.js||g; s|index||g')
          node screenshot-script.js $URLS
        env:
          TARGET_URL: http://localhost:3000

      # Upload screenshots as a PR artifact
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: screenshots/

      # Post a comment to the PR
      - name: Post Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('./screenshots');
            if (files.length === 0) return;

            let body = '### 📸 Visual Preview\n\nScreenshots have been generated for this PR. You can download the full set from the **Actions/Artifacts** tab.\n\n';
            body += '| Page | Viewport | Preview |\n| :--- | :--- | :--- |\n';
            
            files.forEach(file => {
              // file name example: home-1920.png
              const parts = file.replace('.png', '').split('-');
              const width = parts.pop();
              const page = parts.join('-') || 'home';
              body += `| ${page} | ${width}px | [View Snapshot](${process.env.RUN_URL}) |\n`;
            });

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
